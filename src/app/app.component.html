<mat-toolbar color="primary" class="top-toolbar">
  <span>{{ title }}</span>
  <span class="toolbar-spacer"></span>
  <button mat-icon-button color="accent" (click)="exportGraph()" matTooltip="Export graph JSON">
    <mat-icon>download</mat-icon>
  </button>
</mat-toolbar>

<div class="app-grid">
  <aside class="sidebar">
    <app-node-palette></app-node-palette>
  </aside>

  <main class="canvas-panel">
    <app-canvas></app-canvas>
  </main>

  <aside class="sidebar properties-panel">
    <app-node-properties></app-node-properties>
  </aside>
</div>

<section class="export-section">
  <div class="export-actions">
    <button mat-stroked-button color="primary" (click)="exportGraph()">Export JSON</button>
    <button mat-stroked-button color="accent" (click)="loadGraph()">Import JSON</button>
  </div>

  <mat-form-field appearance="outline" class="json-textarea">
    <mat-label>Workflow JSON</mat-label>
    <textarea matInput [(ngModel)]="graphJson" rows="8"></textarea>
  </mat-form-field>
</section>
